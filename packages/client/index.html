<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes</title>

  <!-- Prevent FOUC by applying theme classes immediately -->
  <script>
    (function() {
      try {
        const brightness = localStorage.getItem('hermes_brightness') || 'system';
        const style = localStorage.getItem('hermes_style') || 'ink';
        const legacyTheme = localStorage.getItem('hermes_theme') || 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = brightness === 'dark' || legacyTheme === 'dark' || ((brightness === 'system' || legacyTheme === 'system') && prefersDark);
        const isComic = style === 'comic';
        if (isDark) document.documentElement.classList.add('dark');
        if (isComic) document.documentElement.classList.add('comic');
      } catch (e) {
        console.warn('Failed to apply theme:', e);
      }
    })();
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
